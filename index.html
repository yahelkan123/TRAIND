body {
  background: #080c14;
  font-family: Arial, sans-serif;
  color: white;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ── START OVERLAY ── */
#start-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #080c14;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
}
#start-overlay.hidden { display: none; }
.tap-circle {
  width: 90px; height: 90px; border-radius: 50%;
  background: #00d4ff;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1rem;
  box-shadow: 0 0 40px rgba(0,212,255,0.5);
}
.tap-circle svg { width: 38px; height: 38px; fill: #000; margin-left: 7px; }
#start-overlay h2 { font-size: 1.4rem; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
#start-overlay p { color: rgba(255,255,255,0.45); font-size: 0.82rem; }

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 0.9rem 1.5rem;
  background: linear-gradient(to bottom, rgba(8,12,20,0.97) 60%, transparent);
  display: flex; align-items: center; gap: 0.8rem;
}
.badge {
  background: #00d4ff; color: #000;
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.12em; padding: 0.25rem 0.6rem;
  border-radius: 2px; text-transform: uppercase;
}
#header h1 { font-size: 1.1rem; letter-spacing: 0.08em; text-transform: uppercase; }

/* ── PLAY/PAUSE BUTTON ── */
#bottom-bar {
  position: fixed; bottom: 1.8rem; left: 50%;
  transform: translateX(-50%); z-index: 500;
}
#bottom-bar.hidden { display: none; }
.btn-play {
  padding: 0.5rem 1.3rem; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.1); color: white;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* ── PORTRAIT: single A-Frame scene ── */
#portrait-view {
  position: fixed; inset: 0;
  display: block;
}
#portrait-view a-scene {
  width: 100% !important;
  height: 100% !important;
}

/* ── LANDSCAPE: two side-by-side scenes ── */
#vr-view {
  position: fixed; inset: 0;
  display: none;
  flex-direction: row;
}
.eye {
  flex: 1; height: 100%;
  position: relative; overflow: hidden;
}
.eye a-scene {
  position: absolute; inset: 0;
  width: 100% !important;
  height: 100% !important;
}
/* thin divider between eyes */
#vr-divider {
  position: fixed; top: 0; left: 50%;
  width: 2px; height: 100vh;
  background: #000; z-index: 400;
  display: none;
}

.a-enter-vr-button { display: none !important; }

<body>

  <!-- START OVERLAY -->

  <div id="start-overlay" onclick="startExperience()">
    <div class="tap-circle">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h2>360° Experience</h2>
    <p>Tik om te starten &nbsp;·&nbsp; Draai voor VR</p>
  </div>

  <!-- HEADER -->

  <div id="header">
    <span class="badge">360°</span>
    <h1>Immersive Experience</h1>
  </div>

  <!-- PLAY/PAUSE -->

  <div id="bottom-bar" class="hidden">
    <button class="btn-play" id="playBtn" onclick="togglePlay()">⏸ Pauzeer</button>
  </div>

  <!-- PORTRAIT VIEW -->

  <div id="portrait-view">
    <a-scene vr-mode-ui="enabled:false" embedded>
      <a-assets>
        <video id="vid-portrait"
          src="Nog.mp4" loop muted
          playsinline webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>
      <a-videosphere src="#vid-portrait" rotation="0 180 0"></a-videosphere>
      <a-camera look-controls="enabled:true; touchEnabled:true"></a-camera>
    </a-scene>
  </div>

  <!-- VR DIVIDER -->

  <div id="vr-divider"></div>

  <!-- LANDSCAPE VR VIEW -->

  <div id="vr-view">
    <div class="eye">
      <a-scene vr-mode-ui="enabled:false" embedded>
        <a-assets>
          <video id="vid-left"
            src="Nog.mp4" loop muted
            playsinline webkit-playsinline
            crossorigin="anonymous">
          </video>
        </a-assets>
        <a-videosphere src="#vid-left" rotation="0 180 0"></a-videosphere>
        <a-camera look-controls="enabled:true; touchEnabled:true"></a-camera>
      </a-scene>
    </div>
    <div class="eye">
      <a-scene vr-mode-ui="enabled:false" embedded>
        <a-assets>
          <video id="vid-right"
            src="Nog.mp4" loop muted
            playsinline webkit-playsinline
            crossorigin="anonymous">
          </video>
        </a-assets>
        <a-videosphere src="#vid-right" rotation="0 180 0"></a-videosphere>
        <a-camera look-controls="enabled:true; touchEnabled:true"></a-camera>
      </a-scene>
    </div>
  </div>

  <script>
    const vPortrait  = document.getElementById('vid-portrait');
    const vLeft      = document.getElementById('vid-left');
    const vRight     = document.getElementById('vid-right');
    const allVideos  = [vPortrait, vLeft, vRight];

    const portraitView  = document.getElementById('portrait-view');
    const vrView        = document.getElementById('vr-view');
    const vrDivider     = document.getElementById('vr-divider');
    const header        = document.getElementById('header');
    const bottomBar     = document.getElementById('bottom-bar');
    const playBtn       = document.getElementById('playBtn');
    const startOverlay  = document.getElementById('start-overlay');

    let playing = false;
    let inVR    = false;
    let started = false;

    /* ── START ── */
    function startExperience() {
      allVideos.forEach(v => { v.muted = true; v.play(); });
      playing = true;
      started = true;
      startOverlay.classList.add('hidden');
      updateBtn();
      checkOrientation();
    }

    /* ── PLAY / PAUSE ── */
    function togglePlay() {
      if (playing) {
        allVideos.forEach(v => v.pause());
        playing = false;
      } else {
        allVideos.forEach(v => v.play());
        playing = true;
      }
      updateBtn();
    }

    function updateBtn() {
      playBtn.textContent = playing ? '⏸ Pauzeer' : '▶ Afspelen';
    }

    /* ── ORIENTATION ── */
    function checkOrientation() {
      if (!started) return;
      // use screen.orientation if available, else fall back to dimensions
      let landscape;
      if (screen.orientation) {
        landscape = screen.orientation.type.includes('landscape');
      } else {
        landscape = window.innerWidth > window.innerHeight;
      }
      landscape ? showVR() : showPortrait();
    }

    function showVR() {
      if (inVR) return;
      inVR = true;

      // sync time
      vLeft.currentTime  = vPortrait.currentTime;
      vRight.currentTime = vPortrait.currentTime;
      allVideos.forEach(v => { v.muted = true; v.play(); });

      portraitView.style.display = 'none';
      vrView.style.display       = 'flex';
      vrDivider.style.display    = 'block';
      header.style.display       = 'none';
      bottomBar.classList.add('hidden');
    }

    function showPortrait() {
      if (!inVR) {
        // First time in portrait after start
        bottomBar.classList.remove('hidden');
        return;
      }
      inVR = false;

      // sync time back
      vPortrait.currentTime = vLeft.currentTime;
      vPortrait.muted = true;
      vPortrait.play();

      portraitView.style.display = 'block';
      vrView.style.display       = 'none';
      vrDivider.style.display    = 'none';
      header.style.display       = 'flex';
      bottomBar.classList.remove('hidden');
    }

    /* ── LISTENERS ── */
    window.addEventListener('resize', () => setTimeout(checkOrientation, 250));
    if (screen.orientation) {
      screen.orientation.addEventListener('change', () => setTimeout(checkOrientation, 350));
    }
  </script>

</body>
</html>
