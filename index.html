<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360° Video Experience</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; font-family: Arial, sans-serif; color: white; height: 100vh; overflow: hidden; }

```
/* Start overlay */
#start-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #080c14; cursor: pointer;
}
#start-overlay.hidden { display: none; }
.tap-circle {
  width: 90px; height: 90px; border-radius: 50%; background: #00d4ff;
  display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;
  box-shadow: 0 0 40px rgba(0,212,255,0.4);
}
.tap-circle svg { width: 36px; height: 36px; fill: #000; margin-left: 6px; }
#start-overlay p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 0.5rem; }
#start-overlay small { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 0.4rem; }

/* Header (portrait only) */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  padding: 1rem 2rem;
  background: linear-gradient(to bottom, rgba(8,12,20,0.95), transparent);
  display: flex; align-items: center; gap: 1rem;
}
.badge {
  background: #00d4ff; color: #000; font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; padding: 0.3rem 0.7rem; border-radius: 2px; text-transform: uppercase;
}
#header h1 { font-size: 1.3rem; letter-spacing: 0.1em; text-transform: uppercase; }

/* Play/pause knop */
#bottom-controls {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  z-index: 999; display: none;
}
.btn-play {
  padding: 0.55rem 1.3rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(10px);
}

/* PORTRAIT: normale A-Frame scene */
#portrait-view { width: 100%; height: 100vh; display: block; }

/* LANDSCAPE: VR split screen */
#vr-view {
  display: none;
  width: 100vw; height: 100vh;
  flex-direction: row;
}
#vr-view .eye {
  width: 50%; height: 100%;
  overflow: hidden; position: relative;
}
#vr-view .eye a-scene {
  width: 100% !important;
  height: 100% !important;
  position: absolute; inset: 0;
}

/* Middellijn */
#vr-divider {
  position: fixed; top: 0; left: 50%; width: 2px; height: 100vh;
  background: #000; z-index: 100; display: none;
}

a-scene { height: 100vh !important; }
.a-enter-vr-button { display: none !important; }

<body>

  <div id="start-overlay" onclick="startExperience()">
    <div class="tap-circle">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <p>Tik om te starten</p>
    <small>Draai je telefoon voor VR modus</small>
  </div>

  <div id="header">
    <span class="badge">360°</span>
    <h1>Immersive Experience</h1>
  </div>

  <div id="bottom-controls">
    <button class="btn-play" id="playBtn" onclick="togglePlay()">⏸ Pauzeer</button>
  </div>

  <!-- PORTRAIT VIEW: één A-Frame scene -->

  <div id="portrait-view">
    <a-scene vr-mode-ui="enabled: false" embedded>
      <a-assets>
        <video id="video360" src="Nog.mp4" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>
      <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
      <a-camera look-controls="enabled: true"></a-camera>
    </a-scene>
  </div>

  <!-- LANDSCAPE VIEW: twee aparte canvassen naast elkaar -->

  <div id="vr-divider"></div>
  <div id="vr-view">
    <div class="eye" id="eye-left">
      <a-scene vr-mode-ui="enabled: false" embedded>
        <a-assets>
          <video id="video360-left" src="Nog.mp4" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>
        <a-videosphere src="#video360-left" rotation="0 180 0"></a-videosphere>
        <a-camera look-controls="enabled: true"></a-camera>
      </a-scene>
    </div>
    <div class="eye" id="eye-right">
      <a-scene vr-mode-ui="enabled: false" embedded>
        <a-assets>
          <video id="video360-right" src="Nog.mp4" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>
        <a-videosphere src="#video360-right" rotation="0 180 0"></a-videosphere>
        <a-camera look-controls="enabled: true"></a-camera>
      </a-scene>
    </div>
  </div>

  <script>
    let playing = false;
    let started = false;
    let isVR = false;

    const video = document.getElementById('video360');
    const videoLeft = document.getElementById('video360-left');
    const videoRight = document.getElementById('video360-right');
    const portraitView = document.getElementById('portrait-view');
    const vrView = document.getElementById('vr-view');
    const vrDivider = document.getElementById('vr-divider');
    const header = document.getElementById('header');
    const bottomControls = document.getElementById('bottom-controls');
    const playBtn = document.getElementById('playBtn');
    const startOverlay = document.getElementById('start-overlay');

    function startExperience() {
      // Start alle drie videos
      [video, videoLeft, videoRight].forEach(v => { v.muted = true; v.play(); });
      playing = true;
      started = true;
      updateBtn();
      startOverlay.classList.add('hidden');
      bottomControls.style.display = 'block';
      checkOrientation();
    }

    function togglePlay() {
      if (playing) {
        [video, videoLeft, videoRight].forEach(v => v.pause());
        playing = false;
      } else {
        [video, videoLeft, videoRight].forEach(v => v.play());
        playing = true;
      }
      updateBtn();
    }

    function updateBtn() {
      playBtn.textContent = playing ? '⏸ Pauzeer' : '▶ Afspelen';
    }

    function enterVR() {
      if (isVR || !started) return;
      isVR = true;
      portraitView.style.display = 'none';
      vrView.style.display = 'flex';
      vrDivider.style.display = 'block';
      header.style.display = 'none';
      bottomControls.style.display = 'none';
      // Sync VR videos met portrait video tijd
      videoLeft.currentTime = video.currentTime;
      videoRight.currentTime = video.currentTime;
      [videoLeft, videoRight].forEach(v => { v.muted = true; v.play(); });
    }

    function exitVR() {
      if (!isVR) return;
      isVR = false;
      portraitView.style.display = 'block';
      vrView.style.display = 'none';
      vrDivider.style.display = 'none';
      header.style.display = 'flex';
      if (started) bottomControls.style.display = 'block';
      video.currentTime = videoLeft.currentTime;
      video.play();
    }

    function checkOrientation() {
      if (!started) return;
      const landscape = window.innerWidth > window.innerHeight;
      if (landscape) enterVR();
      else exitVR();
    }

    window.addEventListener('resize', () => setTimeout(checkOrientation, 300));
    window.screen?.orientation?.addEventListener('change', () => setTimeout(checkOrientation, 400));
  </script>

</body>
</html>
